services:
  mysql:
    image: mysql:8.4
    container_name: floralshop-db
    environment:
      MYSQL_DATABASE: floralshop
      MYSQL_USER: floral
      MYSQL_PASSWORD: floral
      MYSQL_ROOT_PASSWORD: root
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - floral_mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: floralshop-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  floral_mysqldata:
