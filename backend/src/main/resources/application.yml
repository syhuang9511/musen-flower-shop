server:
  port: 8081

spring:
  application:
    name: floral-shop-backend
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/floralshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: floral
    password: floral
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate          # schema 由 Flyway 管理
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

# 應用層級設定（敏感值請放 application-local.yml 並加入 .gitignore）
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-local-yml-at-least-32-bytes-long}
    access-token-ttl-minutes: 120
  email-verification:
    ttl-minutes: 5               # 4.1 驗證碼時效
  cors:
    allowed-origins: http://localhost:5173
  rate-limit:
    login-per-minute: 10         # 8.1 限流防護
    payment-per-minute: 5
  ecpay:
    merchant-id: ${ECPAY_MERCHANT_ID:}
    hash-key: ${ECPAY_HASH_KEY:}
    hash-iv: ${ECPAY_HASH_IV:}
    return-url: http://localhost:8081/api/payments/ecpay/callback
  line:
    channel-id: ${LINE_CHANNEL_ID:}
    channel-secret: ${LINE_CHANNEL_SECRET:}
    messaging-access-token: ${LINE_MESSAGING_TOKEN:}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

logging:
  level:
    com.floralshop: DEBUG
